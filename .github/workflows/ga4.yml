name: GA4 Daily Export

on:
  schedule:
    - cron: "0 * * * *"   # 1時間に1回（毎時0分）
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonを設定
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 依存関係をインストール
        run: |
          pip install --upgrade pip
          pip install requests pandas google-auth google-auth-oauthlib google-api-python-client google-analytics-data

      - name: GA4データ処理（すべて）
        env:
          GA4_SERVICE_KEY: ${{ secrets.GA4_SERVICE_KEY }}
        run: python main.py

      - name: Commit daily_data.csv
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add daily_data.csv
          git commit -m "Update daily_data.csv" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: GitHub Pagesにデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .                # ルート直下の全ファイルを公開
          publish_branch: gh-pages
          force_orphan: true
