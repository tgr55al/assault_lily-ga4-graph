name: GA4 Daily Export

on:
  schedule:
    - cron: "0 15 * * *"   # 毎日 00:00 JST（UTC 15:00）
  workflow_dispatch:       # 手動実行ボタンも追加

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # v3 → v4に更新（最新推奨）

      - name: Set up Python
        uses: actions/setup-python@v5   # v4 → v5に更新
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install google-analytics-data pandas   # 必要ライブラリ追加

      - name: Run GA4 fetch script
        env:
          GA4_SERVICE_KEY: ${{ secrets.GA4_SERVICE_KEY }}   # ← 環境変数で直接渡す（ファイル不要！）
        run: python fetch_ga4.py

      - name: Generate KML
        run: python generate_kml.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
