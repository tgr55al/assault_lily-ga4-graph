name: GA4 Daily Export

on:
  schedule:
    - cron: "0 * * * *"   # 1時間に1回（毎時0分）
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonを設定
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 依存関係をインストール
        run: |
          pip install --upgrade pip
          pip install requests pandas google-auth google-auth-oauthlib google-api-python-client google-analytics-data

      - name: GA4データ処理（すべて）
        env:
          GA4_SERVICE_KEY: ${{ secrets.GA4_SERVICE_KEY }}
        run: python main.py

      - name: Commit daily_activeUsers.csv
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ga4Data/daily_activeUsers.csv
          git commit -m "Update daily_activeUsers.csv" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Commit daily_screenPageViews.csv
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ga4Data/daily_screenPageViews.csv
          git commit -m "Update daily_screenPageViews.csv" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Commit coords.csv
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add master/coords.csv
          git commit -m "Update coords.csv" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: 公開用ファイルを public/ にコピー
        run: |
          mkdir -p public
          cp pages/*.html public/
          cp geojson/*.geojson public/
          cp ga4Data/*.csv public/
          cp master/japan_map.csv public/
          cp master/country_map.csv public/
          cp master/terms.json public/

      - name: GitHub Pagesにデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
