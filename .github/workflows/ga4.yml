name: GA4 Daily Export

on:
  schedule:
    - cron: "0 15 * * *"   # 毎日 00:00 JST（UTC 15:00）
  workflow_dispatch:      # 手動実行も可能

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonを設定
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 依存関係をインストール
        run: pip install requests pandas

      - name: GA4データを取得
        run: python fetch_ga4.py

      - name: KMLとGeoJSONを生成
        run: python generate_kml.py

      - name: GitHub Pagesにデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .          # ルート直下の全ファイルを公開
          publish_branch: gh-pages
          force_orphan: true
