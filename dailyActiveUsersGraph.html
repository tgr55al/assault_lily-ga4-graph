<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki 日別閲覧者数グラフ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; font-family: system-ui, sans-serif; }
        #container { width:100%; height:100vh; padding:20px; box-sizing:border-box; }
        canvas { max-width:100%; max-height:100%; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="chart"></canvas>
    </div>

    <script>
        const verticalLinePlugin = {
            id: 'verticalLinePlugin',
            afterDraw(chart) {
                const { ctx, chartArea, tooltip } = chart;

                if (!tooltip || !tooltip._active || !tooltip._active.length) return;

                const activePoint = tooltip._active[0].element;
                const x = activePoint.x;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.stroke();
                ctx.restore();
            }
        };

        Chart.register(verticalLinePlugin);

        // CSV 読み込み
        fetch('daily_activeUsers.csv?' + Date.now())
            .then(r => r.text())
            .then(csvText => {
                const rows = csvText.trim().split('\n').slice(1); // ヘッダー除去
                const dates = [];
                const values = [];

                rows.forEach(row => {
                    if (!row.trim()) return;
                    const [date, val] = row.split(',');
                    dates.push(date);
                    values.push(parseInt(val));
                });

                new Chart(document.getElementById('chart'), {
                  type: 'line',
                  data: {
                    labels: dates,
                    datasets: [{
                      label: '閲覧者数',
                      data: values,
                      borderColor: '#3388ff',
                      backgroundColor: 'rgba(51, 136, 255, 0.1)',
                      borderWidth: 2,
                      tension: 0,
                      pointRadius: 4,
                      pointHoverRadius: 6
                    }]
                  },
                  options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                      legend: { display: false },
                      title: { display: false },
                      interaction: {
                        mode: 'index',
                        intersect: false
                      },
                      tooltip: {
                        backgroundColor: 'rgba(255,255,255,0.95)',
                        titleColor: '#000',
                        bodyColor: '#000',
                        borderWidth: 0,
                        usePointStyle: false,
                        displayColors: false,
                        intersect: false,
                        mode: 'index',
                        callbacks: {
                          title: function(tooltipItems) {
                            return tooltipItems[0]?.label ?? "";
                          },
                          label: function(context) {
                            const value = context.formattedValue ?? (context.parsed && context.parsed.y) ?? context.raw;
                            return `閲覧者数: ${value} (viewers)`;
                          }
                        }
                      }
                    },
                    scales: {
                      x: { title: { display: false }, grid: { display: false } },
                      y: { beginAtZero: true, title: { display: false } }
                    }
                  }
                });
            })
            .catch(() => {
                document.getElementById('container').innerHTML = '<p style="color:red;padding:20px;">daily_activeUsers.csvの読み込みに失敗しました</p>';
            });
    </script>
</body>
</html>
