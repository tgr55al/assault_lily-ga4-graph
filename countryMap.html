<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
        #debug { position:absolute; top:10px; left:10px; background:white; padding:10px; border:3px solid #3388ff; z-index:1000; font-size:14px; max-width:320px; box-shadow:0 0 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="debug">読み込み中...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 60], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const debug = document.getElementById('debug');

        fetch('ga4_map.kml?' + Date.now())
            .then(r => r.text())
            .then(kmlText => {
                debug.innerHTML = `KML読み込み成功<br>サイズ: ${kmlText.length}文字<br>`;

                // KMLの名前空間を除去（これが一番効く）
                const cleanKml = kmlText.replace(/xmlns="[^"]*"/g, '');
                const parser = new DOMParser();
                const kmlDoc = parser.parseFromString(cleanKml, 'text/xml');

                const placemarks = kmlDoc.getElementsByTagName('Placemark');
                debug.innerHTML += `抽出されたPlacemark: ${placemarks.length}件<br>`;

                const features = [];
                for (let pm of placemarks) {
                    const name = pm.getElementsByTagName('name')[0]?.textContent.trim() || '不明';
                    const value = parseFloat(pm.getElementsByTagName('value')[0]?.textContent.trim()) || 0;
                    const coordsText = pm.getElementsByTagName('coordinates')[0]?.textContent.trim();
                    if (!coordsText) continue;
                    const [lon, lat] = coordsText.split(',').map(n => parseFloat(n));

                    features.push({
                        type: 'Feature',
                        properties: { name, value },
                        geometry: { type: 'Point', coordinates: [lon, lat] }
                    });
                }

                if (features.length === 0) {
                    debug.innerHTML += '<span style="color:red">抽出失敗</span>';
                    return;
                }

                debug.innerHTML += `✅ ${features.length}件の円を表示`;

                L.geoJSON({type:'FeatureCollection', features}, {
                    pointToLayer: (feature, latlng) => {
                        const radius = Math.max(8, Math.sqrt(feature.properties.value || 0) * 2.8); // 日本が一番目立つサイズ
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong><br>値: <strong>${feature.properties.value}</strong>`);
                    }
                }).addTo(map);

                map.fitBounds(L.geoJSON({type:'FeatureCollection', features}).getBounds(), {padding: [50,50]});
            })
            .catch(() => debug.innerHTML = 'KML読み込み失敗');
    </script>
</body>
</html>
