<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 60], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        fetch('ga4_map.geojson?' + Date.now())
            .then(r => r.json())
            .then(geojson => {
                L.geoJSON(geojson, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;
                        const radius = Math.max(8, Math.sqrt(value) * 2.8); // 日本が一番目立つサイズ
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong><br>値: <strong>${feature.properties.value}</strong>`);
                    }
                }).addTo(map);

                map.fitBounds(L.geoJSON(geojson).getBounds(), {padding: [50,50]});
            });
    </script>
</body>
</html>
