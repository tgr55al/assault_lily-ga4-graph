<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
        .leaflet-popup-content { font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script>
        // 地図初期化
        const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        // KMLを読み込み（同じGitHub PagesなのでCORS問題なし）
        fetch('ga4_map.kml')
            .then(response => response.text())
            .then(kmlText => {
                const parser = new DOMParser();
                const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
                
                // toGeoJSONでKML → GeoJSON変換
                const geojson = toGeoJSON.kml(kmlDoc);
                
                // プロポーショナルサークル表示
                L.geoJSON(geojson, {
                    pointToLayer: function(feature, latlng) {
                        const value = parseFloat(feature.properties.value) || 0;
                        // 円の大きさ = √value × 倍率（画像に近い見た目になるよう調整済）
                        // 必要ならここの「2.2」を1.5〜3.0の間で調整してください
                        const radius = Math.max(8, Math.sqrt(value) * 2.2);
                        
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',     // GA4風の青
                            color: '#2c5aa0',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.45
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || '不明';
                        const value = feature.properties.value || 0;
                        layer.bindPopup(`
                            <strong>${name}</strong><br>
                            値: <strong>${value}</strong>
                        `, { closeButton: true });
                    }
                }).addTo(map);
            })
            .catch(err => {
                console.error('KML読み込みエラー:', err);
                document.getElementById('map').innerHTML = '<p style="color:red;padding:20px;">KMLの読み込みに失敗しました。リポジトリにga4_map.kmlがあるか確認してください。</p>';
            });
    </script>
</body>
</html>
