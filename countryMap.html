<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
        #debug { position:absolute; top:10px; left:10px; background:white; padding:10px; border:2px solid red; z-index:1000; font-size:14px; max-width:300px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="debug"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 60], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const debug = document.getElementById('debug');

        fetch('ga4_map.kml')
            .then(r => r.text())
            .then(kmlText => {
                debug.innerHTML = `KMLファイル読み込み成功<br>サイズ: ${kmlText.length} 文字<br>`;

                // 生テキストでPlacemarkの出現数をカウント
                const rawCount = (kmlText.match(/Placemark/gi) || []).length;
                debug.innerHTML += `生テキスト内のPlacemark: ${rawCount}件<br>`;

                const parser = new DOMParser();
                const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
                
                const KML_NS = 'http://www.opengis.net/kml/2.2';
                let placemarks = kmlDoc.getElementsByTagNameNS(KML_NS, 'Placemark');
                if (placemarks.length === 0) placemarks = kmlDoc.getElementsByTagName('Placemark');
                
                debug.innerHTML += `解析後のPlacemark数: ${placemarks.length}件<br>`;

                const features = [];
                for (let pm of placemarks) {
                    const get = (tag) => pm.getElementsByTagNameNS(KML_NS, tag)[0] || pm.getElementsByTagName(tag)[0];
                    const name = get('name')?.textContent.trim() || '不明';
                    let value = 0;
                    const valueEl = get('value') || get('Data')?.querySelector('value');
                    if (valueEl) value = parseFloat(valueEl.textContent.trim()) || 0;

                    const coordsEl = get('coordinates');
                    if (!coordsEl) continue;
                    const [lon, lat] = coordsEl.textContent.trim().split(',').map(Number).slice(0, 2);

                    features.push({
                        type: 'Feature',
                        properties: { name, value },
                        geometry: { type: 'Point', coordinates: [lon, lat] }
                    });
                }

                debug.innerHTML += `最終的に抽出された国数: ${features.length}件`;

                if (features.length === 0) return;

                L.geoJSON({type:'FeatureCollection', features}, {
                    pointToLayer: (feature, latlng) => {
                        const radius = Math.max(8, Math.sqrt(feature.properties.value || 0) * 2.2);
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#2c5aa0',
                            weight: 2,
                            fillOpacity: 0.45
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong><br>値: <strong>${feature.properties.value}</strong>`);
                    }
                }).addTo(map);

                map.fitBounds(L.geoJSON({type:'FeatureCollection', features}).getBounds(), {padding: [50,50]});
            })
            .catch(() => {
                debug.innerHTML = 'KML読み込み失敗';
            });
    </script>
</body>
</html>
