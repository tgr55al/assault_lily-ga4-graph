<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 60], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        fetch('ga4_map.kml?' + Date.now())
            .then(r => r.text())
            .then(kmlText => {
                const parts = kmlText.split('<Placemark>');
                const features = [];

                for (let i = 1; i < parts.length; i++) {
                    const part = parts[i];
                    const nameMatch = part.match(/<name>(.*?)<\/name>/);
                    const valueMatch = part.match(/<value>(.*?)<\/value>/);
                    const coordMatch = part.match(/<coordinates>(.*?)<\/coordinates>/);

                    if (nameMatch && valueMatch && coordMatch) {
                        const name = nameMatch[1].trim();
                        const value = parseFloat(valueMatch[1].trim()) || 0;
                        const [lon, lat] = coordMatch[1].trim().split(',').map(Number);

                        features.push({
                            type: 'Feature',
                            properties: { name, value },
                            geometry: { type: 'Point', coordinates: [lon, lat] }
                        });
                    }
                }

                L.geoJSON({type: 'FeatureCollection', features}, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;
                        
                        // ★ ここでバランス調整（日本の円が大きすぎないように）
                        // 現在の設定：logスケールで圧縮（おすすめ）
                        const radius = Math.max(6, Math.log10(value + 1) * 18);

                        // 別のバランスにしたい場合は以下を試してください：
                        // const radius = Math.max(6, Math.sqrt(value) * 1.6);   // 従来のsqrt（少し控えめ）
                        // const radius = Math.max(6, Math.pow(value, 0.4) * 35); // さらに抑えたい場合

                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong><br>値: <strong>${feature.properties.value}</strong>`);
                    }
                }).addTo(map);

                map.fitBounds(L.geoJSON({type: 'FeatureCollection', features}).getBounds(), {padding: [50,50]});
            });
    </script>
</body>
</html>
