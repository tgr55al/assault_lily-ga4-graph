<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 60], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const KML_NS = 'http://www.opengis.net/kml/2.2';

        fetch('ga4_map.kml')
            .then(r => r.text())
            .then(kmlText => {
                const parser = new DOMParser();
                const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
                
                // 名前空間対応でPlacemarkを取得
                let placemarks = kmlDoc.getElementsByTagNameNS(KML_NS, 'Placemark');
                if (placemarks.length === 0) {
                    placemarks = kmlDoc.getElementsByTagName('Placemark'); // フォールバック
                }

                const features = [];
                for (let pm of placemarks) {
                    const get = (tag) => 
                        pm.getElementsByTagNameNS(KML_NS, tag)[0] || 
                        pm.getElementsByTagName(tag)[0];

                    const name = get('name')?.textContent.trim() || '不明';
                    const valueStr = get('value')?.textContent.trim() || '0';
                    const value = parseFloat(valueStr);
                    
                    const coordsEl = get('coordinates');
                    if (!coordsEl) continue;
                    const [lon, lat] = coordsEl.textContent.trim().split(',').map(Number).slice(0, 2);
                    
                    features.push({
                        type: 'Feature',
                        properties: { name, value },
                        geometry: { type: 'Point', coordinates: [lon, lat] }
                    });
                }

                if (features.length === 0) {
                    document.getElementById('map').innerHTML += `
                        <p style="position:absolute;top:20px;left:20px;color:red;background:white;padding:15px;border:3px solid red;z-index:1000;">
                            KMLデータが見つかりませんでした<br>
                            Placemark数: ${placemarks.length}件
                        </p>`;
                    return;
                }

                L.geoJSON({type:'FeatureCollection', features}, {
                    pointToLayer: (feature, latlng) => {
                        const radius = Math.max(8, Math.sqrt(feature.properties.value) * 2.2);
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#2c5aa0',
                            weight: 2,
                            fillOpacity: 0.45
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong><br>値: <strong>${feature.properties.value}</strong>`);
                    }
                }).addTo(map);

                map.fitBounds(L.geoJSON({type:'FeatureCollection', features}).getBounds(), {padding: [50,50]});
            });
    </script>
</body>
</html>
