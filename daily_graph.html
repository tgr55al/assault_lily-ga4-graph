<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 日別閲覧数グラフ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; font-family: system-ui, sans-serif; }
        #container { width:100%; height:100vh; padding:20px; box-sizing:border-box; }
        canvas { max-width:100%; max-height:100%; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="chart"></canvas>
    </div>

    <script>
        // ★ 日本語縦書きラベルプラグイン
        const verticalLabelPlugin = {
            id: 'verticalLabelPlugin',
            afterDraw(chart) {
                const yAxis = chart.scales.y;
                const ctx = chart.ctx;

                const label = yAxis.options.title.text;
                if (!label) return;

                const x = yAxis.left - 30;  // 横位置
                const y = (yAxis.top + yAxis.bottom) / 2; // 中央

                ctx.save();
                ctx.font = "16px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const chars = label.split("");
                const lineHeight = 20;

                chars.forEach((ch, i) => {
                    ctx.fillText(ch, x, y - ((chars.length - 1) * lineHeight) / 2 + i * lineHeight);
                });

                ctx.restore();
            }
        };

        Chart.register(verticalLabelPlugin);

        // CSV 読み込み
        fetch('daily_data.csv?' + Date.now())
            .then(r => r.text())
            .then(csvText => {
                const rows = csvText.trim().split('\n').slice(1); // ヘッダー除去
                const dates = [];
                const values = [];

                rows.forEach(row => {
                    if (!row.trim()) return;
                    const [date, val] = row.split(',');
                    dates.push(date);
                    values.push(parseInt(val));
                });

                new Chart(document.getElementById('chart'), {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            label: '日別閲覧数 (Active Users)',
                            data: values,
                            borderColor: '#3388ff',
                            backgroundColor: 'rgba(51, 136, 255, 0.1)',
                            borderWidth: 3,
                            tension: 0.3,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' },
                            title: { display: true, text: '閲覧数推移' }
                        },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: '閲覧数' } },
                            x: { title: { display: true, text: '日付' } }
                        }
                    }
                });
            })
            .catch(() => {
                document.getElementById('container').innerHTML = '<p style="color:red;padding:20px;">daily_data.csvの読み込みに失敗しました</p>';
            });
    </script>
</body>
</html>
