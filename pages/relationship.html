// ============================================================
// 状態管理用変数
//
// アプリ実行中に変化する値を保存する。
//
// data              : relationship.jsonの内容
// charMap           : キャラID→キャラ情報の高速検索用
// gardenFilter      : ガーデン絞り込み状態
// focusId           : 現在フォーカス中キャラ
// initialFocusId    : 初期表示キャラ
// depth             : 表示階層
// allMode           : 全展開モード
// showSpoiler       : ネタバレ表示状態
// network           : vis-network本体
// vNodes / vEdges   : 描画中のノードとエッジ
// ============================================================
let data = { characters: [], relations: [] };
let charMap = {};
let gardenFilter = {};   // garden(正式名称) -> bool
let focusId = null;
let initialFocusId = null;
let depth = 1;
let allMode = false;
let showSpoiler = false;
let network = null;
let vNodes = null;
let vEdges = null;
let isHighlighting = false;

// ============================================================
// データ読み込み
//
// relationship.json を取得し、
// キャラクター情報と関係情報をメモリへ展開する。
//
// 読み込み失敗時は SAMPLE_DATA を使用するため
// GitHub Pages未配置時でも最低限動作する。
// ============================================================
async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    applyData(json);
  } catch (e) {
    // data.json が取得できない場合はサンプルデータで起動
    console.warn("data.json 読み込み失敗、サンプルデータを使用:", e.message);
    applyData(SAMPLE_DATA);
  }
}

function applyData(json) {
  data = json;
  charMap = {};
  gardenFilter = {};
  data.characters.forEach(c => {
    charMap[c.id] = c;
    const s = c.garden || "その他・不明";
    if (!(s in gardenFilter)) gardenFilter[s] = true;
  });

  // URLパラメータ chara= からフォーカス指定
  const params = new URLSearchParams(location.search);
  const charaParam = params.get("chara");
  if (charaParam) {
    const found = data.characters.find(c =>
      c.name === charaParam || c.id === charaParam || (c.wiki && c.wiki === charaParam)
    );

    if (found) {
      focusId = found.id;
      initialFocusId = found.id;
    }
  }

  if (!focusId && data.characters.length) {
    focusId = data.characters[0].id;
    initialFocusId = focusId;
  }

  buildGardenFilter();
  buildLegend();
  updateFocusLabel();
  render();
}

// ============================================================
// BFS（幅優先探索）
//
// フォーカス中キャラクターから関係を辿り、
// 指定階層以内のキャラクターを取得する。
//
// depth=1
//   →直接関係者のみ
//
// depth=2
//   →関係者の関係者まで
//
// depth=3
//   →さらにその先まで
//
// グラフ表示対象を決める最重要処理の一つ。
// ============================================================
function bfs(fid, maxDepth) {
  const visited = { [fid]: 0 };
  const queue = [{ id: fid, d: 0 }];
  const rels = data.relations.filter(r => showSpoiler || !r.spoiler);
  let head = 0;
  while (head < queue.length) {
    const { id, d } = queue[head++];
    if (d >= maxDepth) continue;
    for (const r of rels) {
      let nxt = null;
      if (r.from === id) nxt = r.to;
      else if (r.to === id) nxt = r.from;
      if (nxt && !(nxt in visited)) {
        visited[nxt] = d + 1;
        queue.push({ id: nxt, d: d + 1 });
      }
    }
  }
  return visited;
}

// ============================================================
// ハイライト処理
// ============================================================
function applyHighlight(focusNodeId) {
  if (!network || !vNodes) return;

  // focusNodeId から1階層以内のノードを取得
  const connectedIds = new Set([focusNodeId]);
  const connectedEdgeIds = new Set();
  const rels = data.relations.filter(r => showSpoiler || !r.spoiler);

  for (let i = 0; i < rels.length; i++) {
    const r = rels[i];
    if (r.from === focusNodeId) {
      connectedIds.add(r.to);
      connectedEdgeIds.add(i);
    } else if (r.to === focusNodeId) {
      connectedIds.add(r.from);
      connectedEdgeIds.add(i);
    }
  }

  // ノードの透明度を更新
  const updates = vNodes.get().map(n => {
    const isConnected = connectedIds.has(n.id);
    return {
      id: n.id,
      opacity: isConnected ? 1.0 : 0.2
    };
  });

  vNodes.update(updates);

  // エッジの透明度も更新
  const edgeUpdates = vEdges.get().map(e => {
    const isConnected = connectedEdgeIds.has(e.id);

    return {
      id: e.id,
      width: isConnected ? 2 : 1,
      color: {
        color: isConnected
          ? e.baseColor
          : e.baseColor + "33",
        highlight: e.baseColor,
        hover: e.baseColor
      }
    };
  });

  vEdges.update(edgeUpdates);

  isHighlighting = true;
}

function clearHighlight() {
  if (!network || !vNodes) return;

  // すべてのノードとエッジの透明度をリセット
  const nodeUpdates = vNodes.get().map(n => ({
    id: n.id,
    opacity: 1.0
  }));
  vNodes.update(nodeUpdates);

  const edgeUpdates = vEdges.get().map(e => ({
    id: e.id,
    opacity: 1.0,
    width: 1,
    color: {
      color: e.baseColor,
      highlight: e.baseColor,
      hover: e.baseColor
    }
  }));
  vEdges.update(edgeUpdates);

  isHighlighting = false;
}

// ============================================================
// 描画処理
//
// このファイルの中心となる関数。
//
// 処理の流れ:
//   ① 表示対象キャラを決定
//   ② ガーデンフィルター適用
//   ③ ノード生成
//   ④ 関係線生成
//   ⑤ vis-networkへ渡す
//   ⑥ イベント登録
//   ⑦ ステータス更新
//
// 表示がおかしい時はまず render() を確認する。
// ============================================================
function render() {
  if (!focusId) return;

  // 表示ノード決定
  let reachable;
  if (allMode) {
    reachable = {};
    data.characters.forEach(c => { reachable[c.id] = 0; });
  } else {
    reachable = bfs(focusId, depth);
  }

  // ガーデンフィルター
  const visIds = {};
  for (const id in reachable) {
    const c = charMap[id];
    const sch = c?.garden || "その他・不明";

    // ネタバレありの場合、ネタバレなしのみキャラは非表示
    if (showSpoiler && c?.hideWhenSpoiler) {
      continue;
    }

    // フォーカス中キャラだけは常に表示
    if (id === focusId) {
      visIds[id] = reachable[id];
      continue;
    }
    if (gardenFilter[sch] !== false) visIds[id] = reachable[id];
  }

  // ノード
  const nodes = Object.keys(visIds).map(id => {
    const c = charMap[id];
    const isFocus = id === focusId;
    const dist = visIds[id];
    const faded = dist >= 2;
    const garden = c?.garden || "その他・不明";
    const col = GARDEN_MASTER[garden]?.color || "#9e9e9e";
    const fadedColor = col + "66";

    // 選択ノードかそれ以外かでベースサイズを切り替え
    const baseSize = isFocus ? 40 : faded ? 20 : 25;

    return {
      id,
      label:
        (showSpoiler && c?.spoilerName)
          ? c.spoilerName
          : (c?.name ?? id),
      shape: "circularImage",
      image: c?.image || DEFAULT_IMAGE,
      color: {
        background: "#ffffff",
        highlight: { background: "#ffffff", border: col },
        border: faded ? fadedColor : col
      },
      font: {
        size: isFocus ? 14 : 12,
        color: faded ? "#999" : "#111",
        bold: isFocus,
        vadjust: 5
      },
      borderWidth: faded ? 1 : 2,
      size: baseSize,
      // 選択時に少し大きくなるよう内部パラメータを設定
      scaling: {
        min: baseSize,
        max: baseSize * 1.3
      },
      opacity: 1.0
    };
  });

  // エッジ
  const edges = [];
  data.relations.forEach((r, i) => {
    if (!showSpoiler && r.spoiler) return;
    if (showSpoiler && r.hideWhenSpoiler) return;
    if (!(r.from in visIds) || !(r.to in visIds)) return;

    // allMode以外: 少なくとも片方が (depth-1) 以内でなければスキップ
    if (!allMode) {
      const dFrom = visIds[r.from] ?? Infinity;
      const dTo   = visIds[r.to]   ?? Infinity;
      if (dFrom > depth - 1 && dTo > depth - 1) return;
    }

    const col = getRelColor(r.type);

    edges.push({
      id: i,
      from: r.from,
      to: r.to,
      label: r.type === "同レギオン" ? "" : r.type,
      baseColor: col,
      color: {
        color: col,
        highlight: col,
        hover: col
      },
      font: { face: "Hiragino Sans, Meiryo, sans-serif", size: 10, color: col, strokeWidth: 3, strokeColor: "#fff" },
      width: 1,
      dashes: false,
      arrows: "",
      opacity: 1.0
    });
  });

  vNodes = new vis.DataSet(nodes);
  vEdges = new vis.DataSet(edges);
  const container = document.getElementById("network");

  const opts = {
    physics: {
      enabled: true,
      forceAtlas2Based: {
        gravitationalConstant: -80,
        centralGravity: 0.005,
        springLength: 150,
        springConstant: 0.18,
        damping: 0.4
      },
      stabilization: { iterations: allMode ? 80 : 150 },
      maxVelocity: 180,
      solver: "forceAtlas2Based",
      timestep: 0.35
    },
    nodes: {
      font: { face: "Hiragino Sans, Meiryo, sans-serif" }
    },
    edges: {
      smooth: { type: "continuous" },
      font: { face: "Hiragino Sans, Meiryo, sans-serif", align: "middle" }
    },
    // hover: false に変更し、選択時の挙動を設定
    interaction: { hover: false, tooltipDelay: 3600000, navigationButtons: false }
  };

  if (network) {
    network.setOptions(opts);
    network.setData({ nodes: vNodes, edges: vEdges });
  } else {
    network = new vis.Network(container, { nodes: vNodes, edges: vEdges }, opts);

    // クリック: フォーカス変更 + アイコンサイズ変更処理
    network.on("click", params => {
      if (!params.nodes.length) {
        clearHighlight();
        return;
      }

      const id = params.nodes[0];
      const c = charMap[id];
      if (!c) return;

      focusId = id;
      updateFocusLabel();
      updateFade();

      // ハイライトを適用
      applyHighlight(id);
    });

    network.on("dragStart", () => {
      network.startSimulation();
    });

	// ダブルクリック: ページを開く
    network.on("doubleClick", params => {
      if (!params.nodes.length) return;
      const c = charMap[params.nodes[0]];
      if (!c) return;
      const page = c.wiki || c.name;
      window.open(WIKI_BASE + encodeURIComponent(page), "_blank");
    });
  }

  const nodeCnt = Object.keys(visIds).length;
  const edgeCnt = edges.length;
  setStatus(`表示中: ${nodeCnt}人 / 全${data.characters.length}人、関係: ${edgeCnt}件`
    + (allMode ? "　【全展開モード】" : `　【${depth}階層】`)
    + (showSpoiler ? "　⚠ネタバレON" : ""));
}

function updateFade() {
  const distMap = bfs(focusId, 999);

  const nodes = vNodes.get().map(n => {
    const c = charMap[n.id];
    const garden = c?.garden || "その他・不明";

    const col =
      GARDEN_MASTER[garden]?.color ||
      "#9e9e9e";

    const fadedColor = col + "66";

    const dist = distMap[n.id] ?? Infinity;
    const faded = dist >= 2;

    return {
      id: n.id,
      size: n.id === focusId ? 40 : (faded ? 20 : 25),
      borderWidth: faded ? 1 : 2,
      color: {
        border: faded ? fadedColor : col
      },
      font: {
        color: faded ? "#999" : "#111"
      }
    };
  });

  vNodes.update(nodes);
}

// ============================================================
// ステータスバー
// ============================================================
function setStatus(msg) {
  document.getElementById("status-text").textContent = msg;
}

// ============================================================
// フォーカスラベル更新
// ============================================================
function updateFocusLabel() {
  const c = charMap[focusId];
  if (!c) return;
  document.getElementById("focus-name").textContent =
    (showSpoiler && c.spoilerName)
      ? c.spoilerName
      : c.name;
  const link = document.getElementById("focus-link");
  const page = c.wiki || c.name;
  link.href = WIKI_BASE + encodeURIComponent(page);
  link.style.display = "";
}

// ============================================================
// ガーデンフィルター
// ============================================================
function buildGardenFilter() {
  const sf = document.getElementById("garden-filter");
  // ラベルだけ残して再構築
  while (sf.children.length > 1) sf.removeChild(sf.lastChild);

  Object.keys(GARDEN_MASTER).filter(garden => garden in gardenFilter).forEach(garden => {
    const col = GARDEN_MASTER[garden]?.color || "#9e9e9e";
    const chip = document.createElement("label");
    chip.className = "garden-chip";
    chip.style.borderColor = col;
    chip.style.color = col;

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.checked = true;
    chk.addEventListener("change", () => {
      gardenFilter[garden] = chk.checked;
      chip.classList.toggle("off", !chk.checked);
      clearHighlight();
      render();
    });

    chip.appendChild(chk);
    // getGardenShortName を使って、後ろの「女学院」などをカットした名前を表示
    chip.appendChild(document.createTextNode(getGardenShortName(garden)));
    sf.appendChild(chip);
  });
}

// ============================================================
// 凡例
// ============================================================
function buildLegend() {
  const lg = document.getElementById("legend");
  lg.innerHTML = "";

  // 関係種別
  const relTitle = document.createElement("div");
  relTitle.style.cssText = "width:100%;font-size:10px;color:#888;margin-bottom:2px";
  relTitle.textContent = "── 関係の種類";
  lg.appendChild(relTitle);

  Object.entries(REL_LEGEND).forEach(([type, col]) => {
    const row = document.createElement("div");
    row.className = "leg-row";
    row.innerHTML = `<span class="leg-line" style="background:${col}"></span>${type}`;
    lg.appendChild(row);
  });

  // 所属ガーデン
  const schTitle = document.createElement("div");
  schTitle.style.cssText = "width:100%;font-size:10px;color:#888;margin-top:6px;margin-bottom:2px";
  schTitle.textContent = "── 所属ガーデン（アイコン枠線色）";
  lg.appendChild(schTitle);

  Object.entries(GARDEN_MASTER).forEach(([garden, info]) => {
    const row = document.createElement("div");
    row.className = "leg-row";
    row.innerHTML =
      `<span class="leg-dot" style="background:${info.color}"></span>${info.short}`;
    lg.appendChild(row);
  });
}

function toggleLegend() {
  const lg = document.getElementById("legend");
  const bar = document.getElementById("legend-toggle-bar");
  const open = lg.classList.toggle("open");
  bar.textContent = open ? "▼ 凡例を隠す" : "▶ 凡例を表示";
}

function toggleGardenFilter() {
  const sf  = document.getElementById("garden-filter");
  const bar = document.getElementById("garden-filter-bar");
  const open = sf.classList.toggle("open");
  bar.textContent = open ? "▼ 所属ガーデンで絞り込む" : "▶ 所属ガーデンで絞り込む";
}

// ============================================================
// ツールバーボタンのイベント
// ============================================================
document.getElementById("btn-redraw").addEventListener("click", () => {
  const v = parseInt(document.getElementById("depth-input").value, 10);
  depth = isNaN(v) || v < 1 ? 1 : Math.min(v, 20);
  document.getElementById("depth-input").value = depth;
  allMode = false;
  document.getElementById("btn-all").classList.remove("active-purple");
  clearHighlight();
  render();
});

document.getElementById("depth-input").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-redraw").click();
});

document.getElementById("btn-all").addEventListener("click", () => {
  allMode = !allMode;
  document.getElementById("btn-all").classList.toggle("active-purple", allMode);
  clearHighlight();
  render();
});

document.getElementById("btn-spoiler").addEventListener("click", () => {
  showSpoiler = !showSpoiler;
  const btn = document.getElementById("btn-spoiler");
  if (showSpoiler) {
    btn.textContent = "ネタバレ ON ⚠";
    btn.classList.add("active-amber");
  } else {
    btn.textContent = "ネタバレ OFF";
    btn.classList.remove("active-amber");
  }
  clearHighlight();
  render();
});

document.getElementById("btn-reset-focus").addEventListener("click", () => {
  if (data.characters.length) {
	// 初期フォーカスへ戻す
    focusId = initialFocusId;

    // 階層を初期値へ
    depth = 1;
    document.getElementById("depth-input").value = 1;

    // 全展開OFF
    allMode = false;
    document.getElementById("btn-all").classList.remove("active-purple");

    // ガーデン絞り込み全解除（＝全てON）
    Object.keys(gardenFilter).forEach(g => {
      gardenFilter[g] = true;
    });

    document
      .querySelectorAll("#garden-filter input[type=checkbox]")
      .forEach(chk => {
        chk.checked = true;
        chk.parentElement.classList.remove("off");
      });

    updateFocusLabel();
    clearHighlight();
    render();
  }
});
