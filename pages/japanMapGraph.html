<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>地域別アクティブユーザー（円グラフ）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    #chart-container { max-width: 800px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>地域別アクティブユーザー（円グラフ）</h1>
  <div id="chart-container">
    <canvas id="regionPie"></canvas>
  </div>

  <script>
    // ▼ CSV を読み込む関数（trim 付き）
    async function loadCSV(url) {
      const text = await fetch(url).then(r => r.text());
      const lines = text.trim().split(/\r?\n/);
      const header = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).map(line => {
        const cols = line.split(',').map(c => c.trim());
        const obj = {};
        header.forEach((h, i) => obj[h] = cols[i] ?? '');
        return obj;
      });
    }

    async function main() {
      // ▼ 外部CSVを読み込み
      const regionRows = await loadCSV('ga4_region_japan.csv'); // region,activeUsers
      const regionJaRows = await loadCSV('japan_map.csv');  // english,japanese

      // ▼ 日本語変換マップ作成（英語 → 日本語）
      const regionJaMap = {};
      regionJaRows.forEach(row => {
        const key = (row.english || '').trim();
        const val = (row.japanese || '').trim();
        if (key) {
          regionJaMap[key] = val;
        }
      });

      // ▼ データ整形（(not set) と空欄を除外）
      const data = regionRows
        .map(r => ({
          region: (r.region || '').trim(),
          activeUsers: Number(r.activeUsers || 0)
        }))
        .filter(r => r.region && r.region !== '(not set)' && r.activeUsers > 0);

      // ▼ 合計値
      const total = data.reduce((sum, r) => sum + r.activeUsers, 0);

      // ▼ 2% 未満を Other にまとめる
      const threshold = total * 0.02;
      const major = [];
      let otherSum = 0;

      data.forEach(r => {
        if (r.activeUsers < threshold) {
          otherSum += r.activeUsers;
        } else {
          major.push(r);
        }
      });

      if (otherSum > 0) {
        major.push({ region: 'Other', activeUsers: otherSum });
      }

      // ▼ ラベル（日本語変換）
      const labels = major.map(r => {
        if (r.region === 'Other') return 'その他';
        const key = r.region.trim();
        return regionJaMap[key] || key; // マップに無ければ英語のまま
      });

      // ▼ 値
      const values = major.map(r => r.activeUsers);

      // ▼ Chart.js 描画
      const ctx = document.getElementById('regionPie').getContext('2d');

      const colors = [
        '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
        '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ab',
        '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
        '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf'
      ];

      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: labels.map((_, i) => colors[i % colors.length]),
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'right' },
            title: {
              display: true,
              text: '地域別アクティブユーザー（日本語 + Other 集約）'
            },
            datalabels: {
              color: '#000',
              font: {
                size: 11,
              },
              formatter: (value, ctx) => {
                const dataArr = ctx.chart.data.datasets[0].data;
                const sum = dataArr.reduce((a, b) => a + b, 0);
                const pct = sum ? (value / sum * 100).toFixed(1) + '%' : '';
                const label = ctx.chart.data.labels[ctx.dataIndex];
                return label + '\n' + pct;
              },
              textAlign: 'center',
              anchor: 'center',
              align: 'center',
              clamp: true
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    main();
  </script>
</body>
</html>
