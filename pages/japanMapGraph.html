<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アサルトリリィwiki プロポーショナルサークル日本地図（円グラフ）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    #chart-container { max-width: 800px; margin: 0 auto; padding: 0; }
    canvas { display: block; margin: 0; padding: 0; }
    /* 合計表示のスタイル */
    #total {
      margin-top: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #111;
    }
  </style>
</head>
<body>

  <div id="chart-container">
    <canvas id="regionPie"></canvas>
    <!-- ここに合計を表示 -->
    <div id="total" aria-live="polite"></div>
  </div>

  <script>
    // 不可視文字・全角スペースも含めて正規化
    function normalize(str) {
      return (str || "")
        .replace(/^\uFEFF/, "")   // BOM
        .replace(/\u200B/g, "")   // ゼロ幅スペース
        .replace(/　/g, " ")      // 全角スペース → 半角
        .trim();
    }

    async function loadCSV(url) {
      let text = await fetch(url).then(r => r.text());
      text = text.replace(/^\uFEFF/, ""); // BOM除去
      const lines = text.trim().split(/\r?\n/);
      const header = lines[0].split(',').map(h => normalize(h));

      return lines.slice(1).map(line => {
        const cols = line.split(',').map(c => normalize(c));
        const obj = {};
        header.forEach((h, i) => obj[h] = cols[i] || "");
        return obj;
      });
    }

    async function main() {
      // ga4_region_japan.csv と japan_map.csv を読み込み
      const regionRows = await loadCSV("ga4_region_japan.csv");
      const regionJaRows = await loadCSV("japan_map.csv");

      // 英語 → 日本語マップ
      const regionJaMap = {};
      regionJaRows.forEach(row => {
        const key = normalize(row.english);
        const val = normalize(row.japanese);
        if (key) regionJaMap[key] = val;
      });

      // データ整形：(not set)・空欄・0 を除外
      const data = regionRows
        .map(r => ({
          region: normalize(r.region),
          activeUsers: Number(r.activeUsers || 0)
        }))
        .filter(r => r.region !== "" && r.region !== "(not set)" && r.activeUsers > 0);

      // 合計
      const total = data.reduce((s, r) => s + r.activeUsers, 0);

      // 3% 以下を Other にまとめる
      const threshold = total * 0.03;
      const major = [];
      let otherSum = 0;

      data.forEach(r => {
        if (r.activeUsers < threshold) {
          otherSum += r.activeUsers;
        } else {
          major.push(r);
        }
      });

      if (otherSum > 0) {
        major.push({ region: "Other", activeUsers: otherSum });
      }

      // 日本語ラベル（ja）と英語ラベル（en）を別配列で作成し、表示用に結合する
      const labelsJa = major.map(r => {
        if (r.region === "Other") return "その他";
        const key = normalize(r.region);
        return regionJaMap[key] || key;
      });
      const labelsEn = major.map(r => r.region === "Other" ? "Other" : r.region);

      // 表示ラベル: "日本語 (English)"
      const displayLabels = labelsJa.map((ja, i) => `${ja} (${labelsEn[i]})`);

      // 値
      const values = major.map(r => r.activeUsers);

      // 円グラフ描画
      const ctx = document.getElementById("regionPie").getContext("2d");

      const colors = [
        "#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
        "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ab",
        "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd",
        "#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf"
      ];

      new Chart(ctx, {
        type: "pie",
        data: {
          labels: displayLabels,
          datasets: [{
            data: values,
            backgroundColor: displayLabels.map((_, i) => colors[i % colors.length]),
            radius: "98%",
          }]
        },
        options: {
          responsive: true,
          animation: false,
          transitions: {
            active: {
              animation: {
                duration: 0
              }
            }
          },
          layout: {
            padding: 0
          },
          plugins: {
            legend: { position: "right" },
            title: { display: false },
            datalabels: {
              color: "#000",
              font: {
                size: 11,
                weight: "bold"
              },
              formatter: (value, ctx) => {
                const dataArr = ctx.chart.data.datasets[0].data;
                const sum = dataArr.reduce((a, b) => a + b, 0);
                const pct = ((value / sum) * 100).toFixed(1) + "%";
                return pct;
              },
              textAlign: "center",
              anchor: "center",
              align: "end",
              clamp: false,
              offset: (ctx) => {
                const chart = ctx.chart;
                const refWidth = 500; // 100% と見なす基準幅
                const current = (chart.chartArea && chart.chartArea.width) ? chart.chartArea.width : chart.width;
                const scale = Math.max(0, Math.min(1, current / refWidth)); // 0～1 にクランプ

                const baseEven = 4;
                const baseOdd  = 32;
                const even = Math.round(baseEven * scale);
                const odd  = Math.round(baseOdd  * scale);

                return (ctx.dataIndex % 2 === 0) ? even : odd;
              }
            },
            // ツールチップをカスタム
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.95)',
              titleColor: '#000',
              bodyColor: '#000',
              borderWidth: 0,
              displayColors: false,
              callbacks: {
                // 1行目: ラベル（displayLabels のまま）
                title: function(tooltipItems) {
                  return tooltipItems[0]?.label ?? "";
                },
                // 2行目: 閲覧者数: {値} (viewers)
                label: function(context) {
                  const value = context.parsed ?? context.raw ?? 0;
                  return `閲覧者数: ${value} (viewers)`;
                }
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });

      // --- ここで合計を表示 ---
      const totalValue = values.reduce((a, b) => a + b, 0);
      const formattedTotal = new Intl.NumberFormat('ja-JP').format(totalValue);
      document.getElementById('total').textContent = `閲覧者数合計: ${formattedTotal} (viewers)`;
    }

    main();
  </script>

</body>
</html>
