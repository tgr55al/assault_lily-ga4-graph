<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル日本地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 本州＋沖縄 用の矩形境界（必要に応じて微調整してください）
        const southWest = L.latLng(24.0, 122.0); // 南西（沖縄を含む）
        const northEast = L.latLng(40.0, 146.0); // 北東（北海道は含まない）
        const japanBoundsHonshuOkinawa = L.latLngBounds(southWest, northEast);

        // マップ初期化
        const map = L.map('map', {
            center: [34.5, 136.0],
            zoom: 5,
            minZoom: 4,
            maxZoom: 12,
            worldCopyJump: false,          // 横ループを無効化
            maxBounds: japanBoundsHonshuOkinawa,
            maxBoundsViscosity: 1.0       // 境界で完全に押し戻す
        });

        // タイルレイヤー
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

		// ★ GeoJSON を読み込む（pages/ から見て ../geojson/）
        fetch('ga4_map_japan.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {

                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;

                        // 日本は世界より密集しているので少し大きめ
                        const radius = Math.max(6, Math.log10(value + 1) * 7);

                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(
                            `<strong>${feature.properties.name}</strong><br>
                             閲覧者数: <strong>${feature.properties.value}</strong>`
                        );
                    }
                }).addTo(map);

                const bounds = geoLayer.getBounds();
                if (bounds.isValid()) {
                    // GeoJSON の範囲に合わせて表示（パディングを追加）
                    map.fitBounds(bounds.pad(0.15), { padding: [50, 50] });
                }
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });

        // フォールバック: moveend で境界外なら押し戻す（maxBoundsViscosity が効かない場合の保険）
        map.on('moveend', () => {
            const center = map.getCenter();
            if (!japanBoundsHonshuOkinawa.contains(center)) {
                map.panInsideBounds(japanBoundsHonshuOkinawa, { animate: true });
            }
        });

        // 追加オプション（必要なら有効化）
        // map.setMaxBounds(japanBoundsHonshuOkinawa); // 既にオプションで設定済み
    </script>
</body>
</html>
