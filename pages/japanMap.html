<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル日本地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
		// --- 北海道＋本州＋沖縄 用の矩形境界
        const southWest = L.latLng(24.0, 122.0); // 南西（沖縄を含む）
        const northEast = L.latLng(46.0, 146.0); // 北東（北海道を含む）
        const japanBoundsHonshuOkinawa = L.latLngBounds(southWest, northEast);

        // 表示制御の定数
        const DEFAULT_CENTER = [34.5, 136.0];
        const DEFAULT_ZOOM = 5;

        // マップ初期化（初期は基本境界を設定）
        const map = L.map('map', {
            center: DEFAULT_CENTER,
            zoom: DEFAULT_ZOOM,
            minZoom: 5,
            maxZoom: 8,
            worldCopyJump: false,
            maxBounds: japanBoundsHonshuOkinawa,
            maxBoundsViscosity: 1.0
        });

        // タイルレイヤー
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 左端だけ狭めたいときに設定する経度
        const desiredLeftLng = 124.0;

        // 下側（南端）を少し上げてスクロール可能範囲を狭める
        const desiredBottomLat = 25.0;

        // マーカー管理用レイヤー
        const markersGroup = L.layerGroup().addTo(map);

        // 元データを保持
        let originalData = null;

        // GeoJSON の features から bounds を計算するユーティリティ
        function computeBoundsFromFeatures(features) {
            if (!features || features.length === 0) return null;
            let minLat = Infinity, minLng = Infinity, maxLat = -Infinity, maxLng = -Infinity;
            features.forEach(f => {
                if (!f || !f.geometry || !Array.isArray(f.geometry.coordinates)) return;
                const lng = Number(f.geometry.coordinates[0]);
                const lat = Number(f.geometry.coordinates[1]);
                if (!isFinite(lat) || !isFinite(lng)) return;
                minLat = Math.min(minLat, lat);
                minLng = Math.min(minLng, lng);
                maxLat = Math.max(maxLat, lat);
                maxLng = Math.max(maxLng, lng);
            });
            if (minLat === Infinity) return null;
            return L.latLngBounds(L.latLng(minLat, minLng), L.latLng(maxLat, maxLng));
        }

        // drawAllMarkers: 2つ目のコード準拠の処理を関数化
        function drawAllMarkers(data) {
            markersGroup.clearLayers();
            if (!data || !data.features || data.features.length === 0) return;

            data.features.forEach(feature => {
                if (!feature || !feature.geometry || !Array.isArray(feature.geometry.coordinates)) return;
                const lng = Number(feature.geometry.coordinates[0]);
                const lat = Number(feature.geometry.coordinates[1]);
                if (!isFinite(lat) || !isFinite(lng)) return;

                const value = feature.properties && feature.properties.value ? Number(feature.properties.value) : 0;
                const radius = Math.max(6, Math.log10(value + 1) * 7);

                const marker = L.circleMarker([lat, lng], {
                    radius: radius,
                    fillColor: '#3388ff',
                    color: '#1e4a8a',
                    weight: 2,
                    fillOpacity: 0.55
                });

                const name = feature.properties && feature.properties.name ? feature.properties.name : '不明';
                marker.bindPopup(`<strong>${name}</strong><br>閲覧者数: <strong>${value}</strong>`);
                markersGroup.addLayer(marker);
            });
        }

        // GeoJSON を読み込んで円マーカーを追加し、表示範囲を調整する（drawAllMarkers を利用）
        fetch('ga4_map_japan.geojson?' + Date.now())
            .then(r => {
                if (!r.ok) throw new Error('HTTP error ' + r.status);
                return r.json();
            })
            .then(data => {
                originalData = data;

                // データが空なら早期リターン
                if (!originalData || !originalData.features || originalData.features.length === 0) {
                    console.warn('GeoJSON が空です。地図は初期設定のまま表示します。');
                    map.invalidateSize();
                    return;
                }

                // マーカーを描画
                drawAllMarkers(originalData);

                // GeoJSON の実際の bounds を計算
                const bounds = computeBoundsFromFeatures(originalData.features);
                if (!bounds || !bounds.isValid()) {
                    console.warn('GeoJSON の bounds が無効です。maxBounds の調整をスキップします。');
                    map.invalidateSize();
                    return;
                }

                // 地図表示に余白を付けた allowedBounds を作る
                const allowedBounds = bounds.pad(0.18);

                // allowedBounds の東端と北端はそのまま使い、左（西）だけ desiredLeftLng にする
                let south = allowedBounds.getSouth();
                const north = allowedBounds.getNorth();
                const east = allowedBounds.getEast();

                // 下側のスクロールを少し減らすために南端を desiredBottomLat より北にする
                south = Math.max(south, desiredBottomLat);

                // 安全チェック: desiredLeftLng が east より東（大きすぎ）にならないようにする
                const newWest = Math.min(desiredLeftLng, east - 0.01);

                // 新しい矩形を作成（左だけ狭め、下側は desiredBottomLat で制限）
                const leftRestrictedBounds = L.latLngBounds(
                    L.latLng(south, newWest),   // 南西（lat, lng）
                    L.latLng(north, east)       // 北東（lat, lng）
                );

                // 新しい maxBounds を設定
                map.setMaxBounds(leftRestrictedBounds);

                // 地図を GeoJSON の範囲に収める（必要なら）
                try {
                    map.fitBounds(bounds, { padding: [20, 20], maxZoom: DEFAULT_ZOOM + 2 });
                } catch (e) {
                    console.warn('fitBounds に失敗しました:', e);
                }

                // コンテナが非表示→表示されるケースに備えて invalidateSize を呼ぶ
                map.invalidateSize();
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
                map.invalidateSize();
            });

        // フォールバック: moveend で境界外なら押し戻す
        map.on('moveend', () => {
            const mb = map.options.maxBounds;
            if (mb && !mb.contains(map.getCenter())) {
                map.panInsideBounds(mb, { animate: true });
            }
        });

        // ウィンドウリサイズ時に再計算
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });
    </script>
</body>
</html>
