<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル日本地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 本州＋沖縄 用の矩形境界
        const southWest = L.latLng(24.0, 122.0); // 南西（沖縄を含む）
        const northEast = L.latLng(40.0, 146.0); // 北東（北海道は含まない）
        const japanBoundsHonshuOkinawa = L.latLngBounds(southWest, northEast);

        // 表示制御の定数
        const DEFAULT_CENTER = [34.5, 136.0];
        const DEFAULT_ZOOM = 5;
        const SAFE_MAX_ZOOM = 10;    // 自動フィットやユーザー操作で許容する最大ズーム
        const MIN_LAT_SPAN = 0.15;   // fitBounds を使うための最小縦幅（度）
        const MIN_LNG_SPAN = 0.2;    // fitBounds を使うための最小横幅（度）

        // fitBounds のアニメーション無効化と補正遅延（最小修正で効果を出すための設定）
        const FIT_ANIMATE = false;
        const CLAMP_DELAY = 250;

        // マップ初期化（初期は基本境界を設定）
        const map = L.map('map', {
            center: DEFAULT_CENTER,
            zoom: DEFAULT_ZOOM,
            minZoom: 4,
            maxZoom: 12,
            worldCopyJump: false,
            maxBounds: japanBoundsHonshuOkinawa,
            maxBoundsViscosity: 1.0
        });

        // タイルレイヤー
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 左端だけ狭めたいときに設定する経度（例: 124.0）
        const desiredLeftLng = 124.0;

        // 下側（南端）を少し上げてスクロール可能範囲を狭める（例: 25.0）
        const desiredBottomLat = 25.0;

        // 誤操作を減らしたい場合は以下を有効化
        // map.doubleClickZoom.disable();
        // map.scrollWheelZoom.disable();
        // map.touchZoom.disable();

        // 常時ズーム上限を超えたら補正するハンドラ（ユーザー操作対策）
        map.on('zoomend', () => {
            if (map.getZoom() > SAFE_MAX_ZOOM) {
                map.setZoom(SAFE_MAX_ZOOM);
            }
        });

        // GeoJSON を読み込んで円マーカーを追加
        fetch('ga4_map_japan.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {
                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties && feature.properties.value ? feature.properties.value : 0;
                        const radius = Math.max(6, Math.log10(value + 1) * 7);
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties && feature.properties.name ? feature.properties.name : '不明';
                        const value = feature.properties && feature.properties.value ? feature.properties.value : 0;
                        layer.bindPopup(
                            `<strong>${name}</strong><br>
                             閲覧者数: <strong>${value}</strong>`
                        );
                    }
                }).addTo(map);

                const bounds = geoLayer.getBounds();
                if (!bounds.isValid()) {
                    // GeoJSON に有効な範囲がない場合はデフォルト表示
                    map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
                    return;
                }

                // --- 最小修正: コンテナが非表示→表示されるケースに備えて invalidateSize を呼ぶ
                // これにより折りたたみ展開時の誤ズームを防げることが多い
                map.invalidateSize();

                // 範囲の大きさをチェックして小さすぎる場合は fitBounds を使わない
                const latSpan = Math.abs(bounds.getNorth() - bounds.getSouth());
                const lngSpan = Math.abs(bounds.getEast() - bounds.getWest());

                if (latSpan < MIN_LAT_SPAN && lngSpan < MIN_LNG_SPAN) {
                    // 単一地点や非常に狭い範囲 → デフォルト表示にフォールバック（またはその地点中心に固定ズーム）
                    const center = bounds.getCenter();
                    map.setView([center.lat, center.lng], 7); // 単一地点は明示的にズームを指定
                } else {
                    // 通常は fitBounds を使う（アニメーション無効 + maxZoom 指定）
                    map.fitBounds(bounds.pad(0.12), { padding: [50, 50], maxZoom: SAFE_MAX_ZOOM, animate: FIT_ANIMATE });

                    // fitBounds のアニメーションやタイミング差で一瞬ズームしすぎることがあるため補正
                    const clampZoom = () => {
                        if (map.getZoom() > SAFE_MAX_ZOOM) {
                            map.setZoom(SAFE_MAX_ZOOM);
                        }
                    };
                    map.once('zoomend', clampZoom);
                    setTimeout(clampZoom, CLAMP_DELAY);
                }

                // 2) 表示後に maxBounds を調整して「上方向にもう少し余裕」を持たせる
                const combined = L.latLngBounds(japanBoundsHonshuOkinawa.getSouthWest(), japanBoundsHonshuOkinawa.getNorthEast());
                combined.extend(bounds.getSouthWest());
                combined.extend(bounds.getNorthEast());

                // pad(値) は縦横に余白を付ける。0.15〜0.25 程度が実用的。
                const allowedBounds = combined.pad(0.18);

                // allowedBounds の東端と北端はそのまま使い、左（西）だけ desiredLeftLng にする
                let south = allowedBounds.getSouth();
                const north = allowedBounds.getNorth();
                const east = allowedBounds.getEast();

                // 下側のスクロールを少し減らすために南端を desiredBottomLat より北にする
                south = Math.max(south, desiredBottomLat);

                // 安全チェック: desiredLeftLng が east より東（大きすぎ）にならないようにする
                const newWest = Math.min(desiredLeftLng, east - 0.01);

                // 新しい矩形を作成（左だけ狭め、下側は desiredBottomLat で制限）
                const leftRestrictedBounds = L.latLngBounds(
                    L.latLng(south, newWest),   // 南西（lat, lng）
                    L.latLng(north, east)       // 北東（lat, lng）
                );

                // 新しい maxBounds を設定
                map.setMaxBounds(leftRestrictedBounds);
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });

        // フォールバック: moveend で境界外なら押し戻す
        map.on('moveend', () => {
            const mb = map.options.maxBounds;
            if (mb && !mb.contains(map.getCenter())) {
                map.panInsideBounds(mb, { animate: true });
            }
        });
    </script>
</body>
</html>
