<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル日本地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 本州＋沖縄 用の矩形境界
        const southWest = L.latLng(24.0, 122.0); // 南西（沖縄を含む）
        const northEast = L.latLng(40.0, 146.0); // 北東（北海道は含まない）
        const japanBoundsHonshuOkinawa = L.latLngBounds(southWest, northEast);

        // マップ初期化（初期は基本境界を設定）
        const map = L.map('map', {
            center: [34.5, 136.0],
            zoom: 5,
            minZoom: 4,
            maxZoom: 12,
            worldCopyJump: false,
            maxBounds: japanBoundsHonshuOkinawa,
            maxBoundsViscosity: 1.0
        });

        // タイルレイヤー
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 左端だけ狭めたいときに設定する経度（例: 124.0）
        // 値を大きくすると（東に寄せると）左側のスクロール可能範囲が狭くなります
        const desiredLeftLng = 124.0;

        // GeoJSON を読み込んで円マーカーを追加
        fetch('ga4_map_japan.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {
                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;
                        const radius = Math.max(6, Math.log10(value + 1) * 7);
                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(
                            `<strong>${feature.properties.name}</strong><br>
                             閲覧者数: <strong>${feature.properties.value}</strong>`
                        );
                    }
                }).addTo(map);

                const bounds = geoLayer.getBounds();
                if (bounds.isValid()) {
                    // 1) GeoJSON の範囲に合わせて表示（パディングを追加）
                    //    maxZoom を指定して過度なズームインを防ぐ
                    map.fitBounds(bounds.pad(0.12), { padding: [50, 50], maxZoom: 10 });

                    // 2) 表示後に maxBounds を調整して「上方向にもう少し余裕」を持たせる
                    //    基本境界と GeoJSON の範囲を結合してから余白を付ける
                    const combined = L.latLngBounds(japanBoundsHonshuOkinawa.getSouthWest(), japanBoundsHonshuOkinawa.getNorthEast());
                    combined.extend(bounds.getSouthWest());
                    combined.extend(bounds.getNorthEast());

                    // pad(値) は縦横に余白を付ける。0.15〜0.25 程度が実用的。
                    const allowedBounds = combined.pad(0.18);

                    // allowedBounds の南北と東端はそのまま使い、左（西）だけ desiredLeftLng にする
                    const south = allowedBounds.getSouth();
                    const north = allowedBounds.getNorth();
                    const east = allowedBounds.getEast();

                    // 安全チェック: desiredLeftLng が east より東（大きすぎ）にならないようにする
                    const newWest = Math.min(desiredLeftLng, east - 0.01);

                    // 新しい矩形を作成（左だけ狭める）
                    const leftRestrictedBounds = L.latLngBounds(
                        L.latLng(south, newWest),   // 南西（lat, lng）
                        L.latLng(north, east)       // 北東（lat, lng）
                    );

                    // 新しい maxBounds を設定
                    map.setMaxBounds(leftRestrictedBounds);

                    // fitBounds 後にもう一段ズームアップしたい場合はここで調整（例: +1）
                    const increasedZoom = Math.min(map.getZoom() + 1, map.getMaxZoom());
                    map.setView(map.getCenter(), increasedZoom, { animate: false });

                    // 中心が新しい境界外にいる場合は押し戻す
                    if (!leftRestrictedBounds.contains(map.getCenter())) {
                        map.panInsideBounds(leftRestrictedBounds, { animate: false });
                    }
                }
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });

        // フォールバック: moveend で境界外なら押し戻す
        map.on('moveend', () => {
            const mb = map.options.maxBounds;
            if (mb && !mb.contains(map.getCenter())) {
                map.panInsideBounds(mb, { animate: true });
            }
        });
    </script>
</body>
</html>
