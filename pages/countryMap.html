<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Assault Lily GA4 プロポーショナルサークル地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            worldCopyJump: true,
            maxBoundsViscosity: 1.0
        }).setView([20, 60], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ★ GeoJSON を読み込む（pages/ から見て ../geojson/）
        fetch('ga4_map.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {

                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;

                        // 日本だけ半径を小さくする
                        const scale = (feature.properties.name === "日本") ? 0.75 : 1.0;
                        const radius = Math.max(6, Math.log10(value + 1) * 5 * scale);

                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 2,
                            fillOpacity: 0.55
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(
                            `<strong>${feature.properties.name}</strong><br>
                             閲覧者数: <strong>${feature.properties.value}</strong>`
                        );
                    }
                }).addTo(map);

                map.fitBounds(geoLayer.getBounds(), { padding: [50, 50] });
            });
    </script>
</body>
</html>
