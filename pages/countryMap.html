<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル世界地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初期設定: 日本を見た目上中央にして世界地図を表示
        const initialCenter = [36.0, 138.0]; // 日本中心付近
        const initialZoom = 1;

        const map = L.map('map', {
            center: initialCenter,
            zoom: initialZoom,
            minZoom: 1,
            maxZoom: 18,
            worldCopyJump: true,
            maxBoundsViscosity: 0.5
        });

        // タイルレイヤー（横ラップ許可）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            noWrap: false
        }).addTo(map);

        // レイヤグループ：すべての描画マーカーをここで管理
        const markersGroup = L.layerGroup().addTo(map);

        // 候補経度（元, ±360）を返す
        function lngCandidates(lng) {
            return [lng - 360, lng, lng + 360];
        }

        // 指定緯度で候補経度のうち bounds に入るものだけ返す
        function visibleLngCandidatesAtLat(lat, lng, bounds) {
            const cands = lngCandidates(lng);
            return cands.filter(candidateLng => bounds.contains(L.latLng(lat, candidateLng)));
        }

        // GeoJSON を読み込んで世界地図上にサークルを配置（左右コピー対応）
        let originalData = null;

        function drawAllMarkers(data) {
            // 既存マーカーをクリア
            markersGroup.clearLayers();
            const bounds = map.getBounds();

            // 各 feature を処理
            data.features.forEach(feature => {
                const lat = feature.geometry.coordinates[1];
                const lng = feature.geometry.coordinates[0];
				// 候補経度のうち現在の表示範囲に入るものを選ぶ
                const visibleCands = visibleLngCandidatesAtLat(lat, lng, bounds);

                // もしどれも見えない場合、近接判定で左右どちらかに表示したいなら
                // center に近い候補を 1 つだけ描画する（オプション）
                if (visibleCands.length === 0) {
                    // 中心経度に最も近い候補を選ぶ
                    const centerLng = map.getCenter().lng;
                    const candidates = lngCandidates(lng);
                    candidates.sort((a, b) => Math.abs(a - centerLng) - Math.abs(b - centerLng));
                    visibleCands.push(candidates[0]);
                }

                // 各可視候補にマーカーを追加
                visibleCands.forEach(candidateLng => {
                    const adjLatLng = L.latLng(lat, candidateLng);
                    const value = feature.properties.value || 0;
                    // 値に応じた半径（世界地図表示でも見やすいようにスケール調整）
                    // 日本のポイントだけ少し小さくする例
                    const isJapan = (feature.properties.country === 'JP' || feature.properties.name === '日本');
                    const baseScale = isJapan ? 4.0 : 6.0;
                    const radius = Math.max(4, Math.log10(value + 1) * baseScale);

                    const marker = L.circleMarker(adjLatLng, {
                        radius: radius,
                        fillColor: '#3388ff',
                        color: '#1e4a8a',
                        weight: 1,
                        fillOpacity: 0.6
                    });

                    marker.bindPopup(`<strong>${feature.properties.name || ''}</strong><br>閲覧者数: <strong>${value}</strong>`);
                    markersGroup.addLayer(marker);
                });
            });
        }

        // 初回読み込み
        fetch('ga4_map.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {
                originalData = data;
                drawAllMarkers(originalData);
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });

        // 地図が移動／ズームされたら再描画（デバウンス）
        let redrawTimer = null;
        function scheduleRedraw() {
            if (!originalData) return;
            if (redrawTimer) clearTimeout(redrawTimer);
            redrawTimer = setTimeout(() => {
                drawAllMarkers(originalData);
                redrawTimer = null;
            }, 150);
        }
        map.on('moveend', scheduleRedraw);
        map.on('zoomend', scheduleRedraw);

        // === ここから上下パン（緯度移動）を抑えるロジック ===
        // 固定する緯度（初期中心の緯度）を保存
        const fixedLat = initialCenter[0];

        // ドラッグ中に緯度を固定して経度のみ変化させる
        // drag イベントは連続的に発火するため animate:false でパンを即時反映
        map.on('drag', () => {
            const c = map.getCenter();
            // 現在の経度はそのまま、緯度だけ fixedLat に戻す
            // panTo を使うとユーザーのドラッグ操作が滑らかに見える
            map.panTo([fixedLat, c.lng], { animate: false });
        });

        // touch デバイスでの挙動を補助（念のため）
        map.on('touchmove', () => {
            const c = map.getCenter();
            map.panTo([fixedLat, c.lng], { animate: false });
        });

        // moveend 後も念のため緯度を固定（ズームやプログラム移動に備える）
        map.on('moveend', () => {
            const c = map.getCenter();
            if (Math.abs(c.lat - fixedLat) > 1e-6) {
                map.setView([fixedLat, c.lng], map.getZoom(), { animate: false });
            }
        });

        // === ロジックここまで ===

        // 最後に、初期表示で日本が中央に来るように再セット（念のため）
        map.setView(initialCenter, initialZoom, { animate: false });
    </script>
</body>
</html>
