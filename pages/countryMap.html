<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル世界地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 世界地図を表示しつつ「見た目上」日本を中央に据える設定
        // - center の経度を 138 前後にすると日本が画面中央に来やすい（ズームレベルに依存）
        // - worldCopyJump: true にして横ラップを有効にし、経度が ±180 を越える移動を滑らかにする
        const initialCenter = [36.0, 138.0]; // 日本中心付近
        const initialZoom = 2;               // 世界地図表示の基本ズーム（必要に応じて 2→3 など調整）

        const map = L.map('map', {
            center: initialCenter,
            zoom: initialZoom,
            minZoom: 1,
            maxZoom: 18,
            worldCopyJump: true,
            maxBoundsViscosity: 0.5
        });

        // タイルレイヤー
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // GeoJSON を読み込んで世界地図上にサークルを配置する
        // ファイル名は適宜変更してください（ga4_map.geojson を想定）
        fetch('ga4_map.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {
                // GeoJSON の各ポイントに対して円マーカーを作成
                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const value = feature.properties.value || 0;
                        // 値に応じた半径（世界地図表示でも見やすいようにスケール調整）
                        // 日本のポイントだけ少し小さくする例
                        const isJapan = (feature.properties.country === 'JP' || feature.properties.name === '日本');
                        const baseScale = isJapan ? 4.0 : 6.0;
                        const radius = Math.max(4, Math.log10(value + 1) * baseScale);

                        return L.circleMarker(latlng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 1,
                            fillOpacity: 0.6
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties.name || '';
                        const value = feature.properties.value || 0;
                        layer.bindPopup(`<strong>${name}</strong><br>閲覧者数: <strong>${value}</strong>`);
                    }
                }).addTo(map);

            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });
    </script>
</body>
</html>
