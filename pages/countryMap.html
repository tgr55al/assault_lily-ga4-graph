<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>アサルトリリィwiki プロポーショナルサークル世界地図</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; }
        #map { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初期設定: 日本を画面中央に固定した世界地図
        const initialCenter = [36.0, 138.0]; // 日本中心付近
        const initialZoom = 1;               // 世界地図のズーム（必要に応じて調整）

        const map = L.map('map', {
            center: initialCenter,
            zoom: initialZoom,
            minZoom: 1,
            maxZoom: 18,
            worldCopyJump: false,    // 自動ジャンプは無効
            maxBoundsViscosity: 0.0  // 境界押し戻しは使わない（パン自体を無効化するため）
        });

        // タイル（横ラップは許可しておくがパンは無効化する）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            noWrap: false
        }).addTo(map);

        // マップのパンを無効化して日本を常に中央に固定
        map.dragging.disable();
        map.touchZoom.disable();
        map.doubleClickZoom.disable();
        map.boxZoom.disable();
        map.keyboard.disable();
        // ただしズーム操作はコントロールで可能にしておく（ホイールは任意で有効化）
        // map.scrollWheelZoom.enable(); // ホイールでズームさせたい場合は有効化

        // 経度を日本中心に合わせて「見た目上」右側に表示するための正規化関数
        function normalizeLngToCenter(lng, centerLng) {
            let d = lng;
            while (d < centerLng - 180) d += 360;
            while (d > centerLng + 180) d -= 360;
            return d;
        }

        // GeoJSON を読み込んでサークルを配置（読み込み時に一度だけ正規化して描画）
        fetch('ga4_map.geojson?' + Date.now())
            .then(r => r.json())
            .then(data => {
                const centerLng = map.getCenter().lng;

                // カスタムレイヤを作成して、経度を正規化した位置で描画
                const geoLayer = L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const origLat = latlng.lat;
                        const origLng = latlng.lng;
                        const adjLng = normalizeLngToCenter(origLng, centerLng);
                        const adjLatLng = L.latLng(origLat, adjLng);

                        const value = feature.properties.value || 0;
                        // 値に応じた半径（世界地図表示でも見やすいようにスケール調整）
                        // 日本のポイントだけ少し小さくする例
                        const isJapan = (feature.properties.country === 'JP' || feature.properties.name === '日本');
                        const baseScale = isJapan ? 4.0 : 6.0;
                        const radius = Math.max(4, Math.log10(value + 1) * baseScale);

                        return L.circleMarker(adjLatLng, {
                            radius: radius,
                            fillColor: '#3388ff',
                            color: '#1e4a8a',
                            weight: 1,
                            fillOpacity: 0.6
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties.name || '';
                        const value = feature.properties.value || 0;
                        layer.bindPopup(`<strong>${name}</strong><br>閲覧者数: <strong>${value}</strong>`);
                    }
                }).addTo(map);

                // 日本を中央に固定しているため、ここで fitBounds は呼ばない
            })
            .catch(err => {
                console.error('GeoJSON の読み込みに失敗しました:', err);
            });
    </script>
</body>
</html>
